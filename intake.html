<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社工系統：1. 新增接案紀錄</title>
  
  <link rel="icon" type="image/jpeg" href="photo.jpg">
  
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 450px; margin: auto; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; width: 100%; margin-top: 20px; border-radius: 5px; font-weight: bold; font-size: 16px;}
    button:hover { background-color: #45a049; }
    #statusMsg { margin-top: 20px; font-weight: bold; }
    
    /* 頂部導覽列按鈕設計 */
    .nav-btn { 
      display: inline-block; margin-bottom: 20px; margin-right: 5px; padding: 8px 12px; 
      background-color: #ecf0f1; color: #2c3e50; text-decoration: none; 
      border-radius: 5px; font-weight: bold; transition: background-color 0.2s;
    }
    .nav-btn:hover { background-color: #bdc3c7; }
    .nav-active { background-color: #2ecc71; color: white; }
    .nav-active:hover { background-color: #27ae60; }
  </style>
</head>
<body>

  <a href="index.html" class="nav-btn">🏠 首頁</a>
  <a href="intake.html" class="nav-btn">📝 1. 接案</a>
  <a href="interview.html" class="nav-btn nav-active">🏡 2. 初訪</a>
  <a href="family.html" class="nav-btn">📋 3. 家庭資料</a>
  <a href="record.html" class="nav-btn">📅 4. 每月紀錄</a>
  <a href="schedule.html" class="nav-btn nav-active">5. 差勤排班</a>

  <h2>1️⃣第一步：新增接案紀錄</h2>
  <form id="intakeForm">
    <label>家戶/案件編號(後壁H、柳營L):</label>
    <input type="text" id="householdId" placeholder="例如：2026-001" required>

    <label>接案日期:</label>
    <input type="date" id="intakeDate" required>

    <label>個案姓名:</label>
    <input type="text" id="caseName" placeholder="服務兒童姓名" required>

    <label>接案來源 / 簡要說明:</label>
    <textarea id="intakeSource" rows="3" placeholder="例如：導師轉介，表示孩子近期常缺交作業..." required></textarea>

    <label>初步評估：是否需要初訪？</label>
    <select id="needInterview">
      <option value="是，安排初訪">是，安排初訪</option>
      <option value="否，為目前服務個案">否，登錄個案資料</option>
      <option value="否，轉介其他資源">否，轉介其他資源</option>
      <option value="否，不符開案條件">否，不符開案條件</option>
    </select>

    <button type="submit">送出接案資料</button>
  </form>

  <div id="statusMsg"></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwve2zEDHEeaMmQnLtqUBZJJJ2EVVjNTbjmqXs20SAL327F56vCZyuFZD08NreWX76caA/exec';

    document.getElementById('intakeForm').addEventListener('submit', function(e) {
      e.preventDefault(); 
      const statusDiv = document.getElementById('statusMsg');
      const submitBtn = document.querySelector('button[type="submit"]');

      statusDiv.style.color = "#333";
      statusDiv.innerText = "⏳ 資料傳送中，請稍候...";
      submitBtn.disabled = true;

      const formData = {
        action: "intake", 
        householdId: document.getElementById('householdId').value,
        intakeDate: document.getElementById('intakeDate').value,
        caseName: document.getElementById('caseName').value,
        intakeSource: document.getElementById('intakeSource').value,
        needInterview: document.getElementById('needInterview').value
      };

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(formData)
      })
      .then(response => response.json())
      .then(data => {
        if(data.status === 'success') {
          statusDiv.style.color = "green";
          // 成功後顯示前往初訪的按鈕
          statusDiv.innerHTML = "✅ 接案紀錄已成功建檔！<br><br><a href='interview.html' style='display:inline-block; padding: 10px 15px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;'>👉 點此接著填寫【初訪紀錄】</a>";
          document.getElementById('intakeForm').reset();
        } else {
          statusDiv.style.color = "red";
          statusDiv.innerText = "❌ 錯誤：" + data.message;
        }
      })
      .catch(error => {
        statusDiv.style.color = "red";
        statusDiv.innerText = "❌ 網路連線錯誤：" + error;
      })
      .finally(() => {
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
