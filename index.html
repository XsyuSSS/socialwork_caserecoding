<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社工個案紀錄系統</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 0; }
    .header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
    .container { max-width: 800px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 0 20px; }
    .card { background: white; padding: 30px 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; text-decoration: none; color: #333; transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    .card h3 { color: #2980b9; margin-bottom: 15px; }
    .card p { font-size: 0.9em; color: #666; }
    .icon { font-size: 40px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📝 璞育塾 - 社工個案管理系統</h1>
    <p>輕鬆建檔、快速紀錄、自動生成報表</p>
  </div>

  <div class="container">
    <a href="intake.html" class="card">
      <div class="icon">🆕</div>
      <h3>1. 新案建檔與初訪</h3>
      <p>新增接案摘要、評估是否開案，並填寫詳細家戶初訪表。</p>
    </a>

    <a href="#" class="card" onclick="alert('功能開發中！下一步就做這個。')">
      <div class="icon">📅</div>
      <h3>2. 每月個案紀錄</h3>
      <p>填寫每月關懷、發放物資或獎助學金等例行與非例行服務。</p>
    </a>

    <a href="#" class="card" onclick="alert('功能開發中！這裡將顯示您的服務量統計。')">
      <div class="icon">📊</div>
      <h3>3. 服務量統計分析</h3>
      <p>查看每月服務總量、特殊議題分佈與各類服務數據。</p>
    </a>
  </div>

</body>
</html>
